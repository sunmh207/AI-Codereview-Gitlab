services:
  app:
    image: swr.cn-south-2.myhuaweicloud.com/yelink_appstore_test/ai-codereview:1.0
    container_name: ai-codereview
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    ports:
      - "5001:5001"
      - "5002:5002"
    volumes:
      - ./data:/app/data
      - ./log:/app/log
    env_file:
      - ./conf/.env
    restart: unless-stopped